<header class="fixed-top">
    <div class="top-bar" [class.scrolled]="isScrolled">
        <div class="container d-flex justify-content-between align-items-center px-5">
            <div class="contact-info">
                <span>
                    <i class="fas fa-phone me-2"></i>
                    (51) 99999-9999 </span>
                <span class="ms-4 d-none d-md-inline">
                    <i class="fas fa-envelope me-2"></i>
                    contato@festivaldopeixe.com.br
                </span>
            </div>
            <div class="social-icons d-flex gap-4">
                <a href="https://www.instagram.com/" target="_blank" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://www.youtube.com/" target="_blank" aria-label="YouTube">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-container d-flex justify-content-between align-items-center mx-auto px-5">
            <a class="nav-logo" routerLink="/" (click)="isMenuOpen = false">
                <img src="assets/images/logo-festival.png" alt="Logo Festival do Peixe" height="50" />
            </a>

            <div class="nav-main-group gap-4" [class.active]="isMenuOpen">
                <ul class="nav-links d-flex m-0 p-0 gap-4 align-items-center">
                    <li><a class="nav-link" routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active-link"
                            (click)="isMenuOpen = false">Home</a></li>
                    <li><a class="nav-link" routerLink="/quem-somos" routerLinkActive="active-link"
                            (click)="isMenuOpen = false">Quem Somos</a></li>
                    <li><a class="nav-link" routerLink="/blog" routerLinkActive="active-link"
                            (click)="isMenuOpen = false">Notícias</a></li>
                    <li><a class="nav-link" routerLink="/contato" routerLinkActive="active-link"
                            (click)="isMenuOpen = false">Contato</a></li>
                </ul>

                <div class="nav-actions">
                    <a class="nav-cta py-2 px-4 rounded-pill text-decoration-none" (click)="comprarIngresso()">Comprar Ingressos</a>
                    @if (authService.isLoggedIn()) {
                    <button (click)="onSignOut()" class="btn btn-outline-danger py-2 px-4 rounded-pill">Sair</button>
                    }
                </div>
            </div>

            <div class="hamburger-menu" (click)="toggleMenu()" [class.active]="isMenuOpen"
                aria-label="Abrir ou fechar menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
</header>

<div class="header-placeholder"></div>
